# ═══════════════════════════════════════════════════════════════════════
#  Override برای حالت توسعه (development)
#  استفاده:
#     docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
#  این فایل فقط سرویس app را عوض می‌کند:
#   - اجرای next dev با hot-reload به جای build استاندالون
#   - NODE_ENV=development  → debug_code در OTP، SW غیرفعال، بدون ارسال SMS
#   - mount کردن سورس برای hot-reload
#  سرویس‌های db / minio / migrate بدون تغییر از فایل اصلی می‌آیند.
# ═══════════════════════════════════════════════════════════════════════
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
    command: sh -c "npx prisma generate && npm run dev -- -H 0.0.0.0"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    # حافظهٔ بیشتر برای کامپایل در حالت dev
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2048M
