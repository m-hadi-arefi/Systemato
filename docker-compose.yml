services:
  # ── PostgreSQL (فقط داخل شبکه، به بیرون expose نمی‌شود) ───────────────────
  db:
    image: postgres:16-alpine
    container_name: systemato_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-systemato}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - systemato_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-systemato}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M

  # ── MinIO (فقط داخل شبکه، به بیرون expose نمی‌شود) ───────────────────────
  minio:
    image: minio/minio:latest
    container_name: systemato_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - systemato_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M

  # ── MinIO bucket init ────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: systemato_minio_init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - systemato_net
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      /usr/bin/mc mb --ignore-existing local/${MINIO_BUCKET:-systemato-media};
      /usr/bin/mc anonymous set download local/${MINIO_BUCKET:-systemato-media};
      echo 'MinIO bucket ready.';
      "
    restart: "no"

  # ── Prisma migrate (فقط داخل شبکه) ───────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    container_name: systemato_migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-systemato}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - systemato_net
    restart: "no"

  # ── Next.js App (تنها سرویسی که پورت ۳۰۰۰ را به بیرون expose می‌کند) ──────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: systemato_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-systemato}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      KAVENEGAR_API_KEY: ${KAVENEGAR_API_KEY:-}
      KAVENEGAR_OTP_TEMPLATE: ${KAVENEGAR_OTP_TEMPLATE:-systemato-otp}
      KAVENEGAR_SENDER: ${KAVENEGAR_SENDER:-}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-systemato-media}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:3000}
      CRON_SECRET: ${CRON_SECRET:-cron-secret}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - systemato_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    # ── محدودیت منابع: ۱ هسته CPU و ۱.۵ گیگابایت رم ───────────────────────
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M

# ── شبکهٔ اختصاصی bridge: ارتباط داخلی سرویس‌ها، فقط app به بیرون باز است ──
networks:
  systemato_net:
    driver: bridge

volumes:
  pg_data:
  minio_data:
